name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: npm audit (high severity gate)
        run: npm audit --audit-level=high --omit=dev

      - name: Overit mock API vypnuto v produkci
        run: |
          if grep -r "NEXT_PUBLIC_MOCK_API=true" .env.production 2>/dev/null; then
            echo "CHYBA: Mock API zapnuto v produkci" && exit 1
          fi

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_MOCK_API: "false"
          NEXT_PUBLIC_API_URL: "http://localhost:8080"
